name: docker-build
on:
    push:
        branches: [main]
jobs:
    docker-build:
        runs-on: ubuntu-latest
        steps:
            - name: checkout code
              uses: actions/checkout@v4
            - name: login to docker
              uses: docker/login-action@v4
              with:
                username: ${{ secrets.DOCKER_USERNAME }}
                password: ${{ secrets.DOCKER_PASSWORD }}
            - name: build and push ingestion
              uses: docker/build-push-action@v7
              with:
                push: true
                tags: ${{ secrets.DOCKER_USERNAME }}/ingestion:latest
                context: .
                file: ./deployment/ingestion/Dockerfile
            - name: build and push pyspark
              uses: docker/build-push-action@v7
              with:
                push: true
                tags: ${{ secrets.DOCKER_USERNAME }}/pyspark:latest
                context: .
                file: ./deployment/pyspark/Dockerfile
            - name: build and push airflow
              uses: docker/build-push-action@v7
              with:
                push: true
                tags: ${{ secrets.DOCKER_USERNAME }}/airflow-custom:latest
                context: .
                file: ./Dockerfile.airflow