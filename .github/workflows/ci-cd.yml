name: Lint and Test
on:
    push:
        branches: [main]
jobs:
    lint-and-test:
        runs-on: ubuntu-latest
        steps:
            - name: Checkout code
              uses: actions/checkout@v4
            - name: setup python 3.10
              uses: actions/setup-python@v5
              with:
                python-version: '3.10'
            - name: Install dependencies
              run: |
                python -m pip install --upgrade pip
                pip install flake8
                pip install -r processing/requirements.txt
            - name: Run Flake8 lint
              run: flake8 .
            - name: Run python syntax check
              run: |
                find . -name "*.py" \
                    -not -path "*/dbt_packages/*" \
                    -not -path "*/target/*" \
                    -not -path "*/.git/*" \
                | xargs python -m py_compile
    docker-build:
        runs-on: ubuntu-latest
        needs: lint-and-test
        steps:
            - name: checkout code
              uses: actions/checkout@v4
            - name: login to docker
              uses: docker/login-action@v4
              with:
                username: ${{ secrets.DOCKER_USERNAME }}
                password: ${{ secrets.DOCKER_PASSWORD }}
            - name: build and push ingestion
              uses: docker/build-push-action@v7
              with:
                push: true
                tags: ${{ secrets.DOCKER_USERNAME }}/ingestion:latest
                context: .
                file: ./deployment/ingestion/Dockerfile
            - name: build and push pyspark
              uses: docker/build-push-action@v7
              with:
                push: true
                tags: ${{ secrets.DOCKER_USERNAME }}/pyspark:latest
                context: .
                file: ./deployment/pyspark/Dockerfile
            - name: build and push airflow
              uses: docker/build-push-action@v7
              with:
                push: true
                tags: ${{ secrets.DOCKER_USERNAME }}/airflow-custom:latest
                context: .
                file: ./Dockerfile.airflow
